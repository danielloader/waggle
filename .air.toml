root = "."
tmp_dir = "tmp"

[build]
  bin         = "tmp/waggle"
  cmd         = "go build -o tmp/waggle ./cmd/waggle"
  delay       = 500
  exclude_dir = ["tmp", "bin", "ui", "internal/ui/dist"]
  exclude_regex = ["_test\\.go"]
  include_ext = ["go"]
  kill_delay  = "500ms"
  log         = "build-errors.log"
  send_interrupt = true
  stop_on_error  = true

[run]
  args = ["--dev", "--addr", "127.0.0.1:4318", "--log-level", "debug"]

[log]
  time = false
