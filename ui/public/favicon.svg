<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <title>waggle</title>

  <!-- Waggle-dance trail: the figure-8 path a bee walks to signal direction
       and distance. Dashed so it reads as motion at every favicon size. -->
  <path d="M4 44 C 4 28, 24 28, 24 40 S 44 52, 44 36 S 62 28, 62 36"
        fill="none"
        stroke="#c89116"
        stroke-width="2.2"
        stroke-dasharray="2.5 3"
        stroke-linecap="round"
        opacity="0.55"/>

  <!-- Wings, tilted outward behind the body. -->
  <ellipse cx="22" cy="19" rx="6.5" ry="10"
           fill="#dbe8ff" opacity="0.85"
           stroke="#1d1d1b" stroke-width="0.6"
           transform="rotate(-25 22 19)"/>
  <ellipse cx="34" cy="19" rx="6.5" ry="10"
           fill="#dbe8ff" opacity="0.85"
           stroke="#1d1d1b" stroke-width="0.6"
           transform="rotate(25 34 19)"/>

  <!-- Yellow body oval; the stripes are drawn on top and clipped to this shape. -->
  <defs>
    <clipPath id="body">
      <ellipse cx="28" cy="36" rx="15" ry="10.5"/>
    </clipPath>
  </defs>
  <ellipse cx="28" cy="36" rx="15" ry="10.5" fill="#f5c518"/>
  <g clip-path="url(#body)">
    <rect x="18" y="24" width="4" height="24" fill="#1d1d1b"/>
    <rect x="26" y="24" width="4" height="24" fill="#1d1d1b"/>
    <rect x="34" y="24" width="4" height="24" fill="#1d1d1b"/>
  </g>
  <ellipse cx="28" cy="36" rx="15" ry="10.5"
           fill="none" stroke="#1d1d1b" stroke-width="0.9"/>

  <!-- Head on the right, with a single white eye-highlight. -->
  <circle cx="47" cy="33" r="6" fill="#1d1d1b"/>
  <circle cx="49" cy="31" r="1.2" fill="#ffffff"/>

  <!-- Antennae. -->
  <path d="M45 27 Q 44 22 47 22"
        fill="none" stroke="#1d1d1b" stroke-width="1.3" stroke-linecap="round"/>
  <path d="M49 26 Q 51 21 54 23"
        fill="none" stroke="#1d1d1b" stroke-width="1.3" stroke-linecap="round"/>

  <!-- Stinger. -->
  <path d="M13 36 L 9 35"
        fill="none" stroke="#1d1d1b" stroke-width="1.6" stroke-linecap="round"/>
</svg>
