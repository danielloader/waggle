# yaml-language-server: $schema=https://goreleaser.com/static/schema.json
# Run locally with `task release:snapshot`. Release workflow lives in
# .github/workflows/release.yml — the UI must be built and copied into
# internal/ui/dist before goreleaser starts (the Go binary embeds it).

version: 2

project_name: waggle

before:
  hooks:
    - go mod tidy

builds:
  - id: waggle
    main: ./cmd/waggle
    binary: waggle
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X main.version={{ .Version }}

archives:
  - id: default
    formats: [tar.gz]
    name_template: >-
      {{ .ProjectName }}_
      {{- .Version }}_
      {{- .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else }}{{ .Arch }}{{ end }}
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - README.md
      - LICENSE*

nfpms:
  - id: waggle
    package_name: waggle
    # nFPM only packages the linux artifacts of this build; darwin/windows
    # are ignored. amd64 + arm64 both produce packages.
    ids: [waggle]
    maintainer: "Daniel Loader <hello@danielloader.uk>"
    homepage: https://github.com/danielloader/waggle
    description: |-
      Local OpenTelemetry viewer for development.
      OTLP/HTTP (4318) and OTLP/gRPC (4317) ingest into SQLite with a
      Honeycomb-style trace/log/metric query UI, served from one binary.
    license: GPL-3.0-only
    # nFPM is bundled in goreleaser (zero-dependency); no rpmbuild/dpkg/fpm
    # needed on the runner. Packages are unsigned — see the install notes.
    formats:
      - deb
      - rpm
      - apk
      - archlinux
    bindir: /usr/bin
    # ConventionalFileName gives each packager its native arch naming
    # (deb: amd64/arm64, rpm/apk: x86_64/aarch64).
    file_name_template: "{{ .ConventionalFileName }}"
    contents:
      - src: README.md
        dst: /usr/share/doc/waggle/README.md
      - src: LICENSE
        dst: /usr/share/doc/waggle/LICENSE
      # systemd unit shipped at the canonical vendor location.
      # /lib/systemd/system/ works for both Debian and Fedora-derived
      # distros (systemd treats /lib and /usr/lib as equivalent for
      # vendor units).
      - src: packaging/systemd/waggle.service
        dst: /lib/systemd/system/waggle.service
        file_info:
          mode: 0644
    # Maintainer scripts: create the `waggle` system user in preinstall,
    # enable+start (or restart after upgrade) in postinstall, stop+disable
    # in preremove, daemon-reload in postremove. They no-op on systems
    # without systemd.
    scripts:
      preinstall: packaging/scripts/preinstall.sh
      postinstall: packaging/scripts/postinstall.sh
      preremove: packaging/scripts/preremove.sh
      postremove: packaging/scripts/postremove.sh

# Homebrew formula (macOS + Linuxbrew). `brews` is deprecated in goreleaser
# v2.10+ in favour of `homebrew_casks`, but only formulas integrate with
# `brew services` — which is the whole reason we ship a tap. We accept the
# deprecation warning; the block still works in v2.x and Homebrew has no
# plans to remove formula support.
brews:
  - name: waggle
    # Tap lives in a separate repo, so the default GITHUB_TOKEN (scoped to
    # this repo) can't push to it — HOMEBREW_TAP_TOKEN is a PAT with
    # contents:write on danielloader/homebrew-tap, passed in release.yml.
    repository:
      owner: danielloader
      name: homebrew-tap
      branch: main
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    # Write to Formula/ in the tap (Homebrew's convention).
    directory: Formula
    homepage: https://github.com/danielloader/waggle
    description: Local OpenTelemetry viewer — OTLP/HTTP + OTLP/gRPC ingest into SQLite + Honeycomb-style UI
    license: GPL-3.0-only
    # Skip publishing for prereleases (e.g. v1.2.3-rc1).
    skip_upload: auto
    install: |
      bin.install "waggle"
    # `brew services start waggle` → launchd LaunchAgent on macOS, systemd
    # user unit on Linuxbrew. KeepAlive restarts on crash; logs go under
    # the brew prefix's var/log so they're easy to find with
    # `brew --prefix`/var/log/waggle.log.
    service: |
      run [opt_bin/"waggle", "--no-open-browser"]
      keep_alive true
      log_path var/"log/waggle.log"
      error_log_path var/"log/waggle.log"
    caveats: |
      Run waggle in the foreground:
        waggle
      Or run it as a background service (LaunchAgent on macOS):
        brew services start waggle
      Logs (when running as a service):
        #{var}/log/waggle.log
    test: |
      assert_match "waggle", shell_output("#{bin}/waggle --version")

kos:
  - id: waggle-docker
    build: waggle
    repositories:
      - ghcr.io/danielloader/waggle
    platforms:
      - linux/amd64
      - linux/arm64
    tags:
      - "{{.Version}}"
      - "{{.Major}}"
      - "{{.Major}}.{{.Minor}}"
      - latest
    bare: true
    preserve_import_paths: false
    base_image: gcr.io/distroless/static-debian12:nonroot
    creation_time: "{{.CommitTimestamp}}"
    ko_data_creation_time: "{{.CommitTimestamp}}"
    env:
      # Container defaults: listen on all interfaces (Docker NAT), write
      # the SQLite file under /data (expect a volume mount), and skip the
      # browser-open (no TTY anyway, but explicit beats implicit). The
      # gRPC ingest also has to bind 0.0.0.0 — the in-process default
      # 127.0.0.1:4317 would be unreachable from the host even with
      # `-p 4317:4317`.
      - WAGGLE_ADDR=0.0.0.0:4318
      - WAGGLE_GRPC_ADDR=0.0.0.0:4317
      - WAGGLE_DB=/data/waggle.db
      - WAGGLE_NO_OPEN=true
    labels:
      org.opencontainers.image.source: https://github.com/danielloader/waggle
      org.opencontainers.image.title: waggle
      org.opencontainers.image.description: Local OpenTelemetry viewer — OTLP/HTTP + OTLP/gRPC ingest into SQLite + Honeycomb-style UI
      org.opencontainers.image.licenses: GPL-3.0-only
    annotations:
      org.opencontainers.image.source: https://github.com/danielloader/waggle

checksum:
  name_template: "checksums.txt"

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "^ci:"
      - "Merge pull request"
      - "Merge branch"

release:
  github:
    owner: danielloader
    name: waggle
  prerelease: auto
  draft: false
  header: |
    ## waggle {{ .Tag }}

    Local OpenTelemetry viewer — OTLP/HTTP (4318) and OTLP/gRPC (4317) ingest into SQLite + Honeycomb-style UI.
  footer: |
    ### Install

    **Homebrew** (macOS, Linuxbrew)
    ```
    brew install danielloader/tap/waggle      # foreground
    brew services start waggle                # or run as a LaunchAgent (logs: $(brew --prefix)/var/log/waggle.log)
    ```

    **Binary** — download from the assets below, extract, and run:
    ```
    ./waggle
    ```

    **Linux packages** — `.deb`, `.rpm`, `.apk`, and Arch `.pkg.tar.zst` (amd64 + arm64) are in the assets below; they install to `/usr/bin/waggle`, ship a systemd unit, and auto-start the service on install (unsigned):
    ```
    sudo dpkg -i waggle_{{ .Version }}_amd64.deb                     # Debian/Ubuntu
    sudo rpm -i waggle-{{ .Version }}-1.x86_64.rpm                   # Fedora/RHEL/openSUSE
    sudo apk add --allow-untrusted waggle_{{ .Version }}_x86_64.apk  # Alpine
    sudo pacman -U waggle-{{ .Version }}-1-x86_64.pkg.tar.zst        # Arch
    systemctl status waggle                                          # check it's up
    ```

    **Docker**
    ```
    docker run --rm -p 4318:4318 -p 4317:4317 -v $(pwd)/data:/data ghcr.io/danielloader/waggle:{{ .Version }}
    ```

    Then point any OTLP exporter at `http://localhost:4318` (HTTP) or `localhost:4317` (gRPC), and open the UI in your browser.
